<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Señal de Prohibido Estacionar -->
  <circle cx="50" cy="50" r="40" fill="#FFFFFF" stroke="#FF0000" stroke-width="4"/>
  <!-- Símbolo de P tachada -->
  <text x="50" y="60" text-anchor="middle" fill="#000000" font-family="Arial, sans-serif" 
        font-size="30" font-weight="bold">P</text>
  <!-- Línea diagonal de prohibición -->
  <line x1="20" y1="20" x2="80" y2="80" stroke="#FF0000" stroke-width="6"/>
</svg>
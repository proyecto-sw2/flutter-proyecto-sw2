<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Señal de Límite de Velocidad -->
  <circle cx="50" cy="50" r="40" fill="#FFFFFF" stroke="#FF0000" stroke-width="4"/>
  <!-- Número de velocidad -->
  <text x="50" y="45" text-anchor="middle" fill="#000000" font-family="Arial, sans-serif" 
        font-size="24" font-weight="bold">50</text>
  <!-- Texto km/h -->
  <text x="50" y="65" text-anchor="middle" fill="#000000" font-family="Arial, sans-serif" 
        font-size="8" font-weight="normal">km/h</text>
</svg>